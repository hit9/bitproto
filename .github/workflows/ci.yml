name: bitproto ci

env:
  TZ: Asia/Shanghai

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python: ["3.11", "3.12", "3.13", "3.14"]
        go: ["1.25"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Set up Golang ${{ matrix.go }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install bitproto compiler
      run: |
        uv pip install --system -e ./compiler

    - name: Install bitproto python lib
      run: |
        uv pip install --system -e ./lib/py

    - name: Install dev requirements
      run: |
        uv pip install --system -r compiler/requirements_dev.txt
        uv pip install --system -r lib/py/requirements_dev.txt
      if: "matrix.python == '3.11'"

    - name: Install tests requirements
      run: |
        uv pip install --system -r tests/requirements_tests.txt

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
      if: "matrix.python == '3.11'"

    - name: Run lints
      run: |
        make lint
      if: "matrix.python == '3.11'"

    - name: Run tests
      run: |
        make test --no-print-directory -s

  big-endian:

    runs-on: ubuntu-24.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4
      with:
        platforms: s390x

    - name: Run endian tests on s390x
      run: |
        docker run --rm --platform linux/s390x \
          -v "${{ github.workspace }}:/work" \
          -w /work \
          python:3.13-bookworm \
          bash -euxo pipefail -c '
            apt-get update
            apt-get install -y --no-install-recommends gcc make
            python -m pip install -r compiler/requirements.txt -r tests/requirements_tests.txt
            ln -sf /usr/local/bin/python /usr/local/bin/python3
            printf "%s\n" \
              "#!/usr/bin/env sh" \
              "PYTHONPATH=/work/compiler exec python -m bitproto._main \"\$@\"" \
              >/usr/local/bin/bitproto
            chmod +x /usr/local/bin/bitproto
            PYTHONPATH=compiler:lib/py python - <<'"'"'PY'"'"'
            import sys
            assert sys.byteorder == "big", sys.byteorder
            PY
            PYTHONPATH=compiler:lib/py python -m pytest tests/test_encoding/test_endian.py -v
          '
