name: bitproto ci

env:
  TZ: Asia/Shanghai

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:

    strategy:
      matrix:
        os: [ubuntu-24.04]
        python: ["3.11", "3.12", "3.13"]
        go: ["1.25"]

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python }}

    - name: Set up Golang ${{ matrix.go }}
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go }}

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Install bitproto compiler
      run: |
        uv pip install --system -e ./compiler

    - name: Install bitproto python lib
      run: |
        uv pip install --system -e ./lib/py

    - name: Install dev requirements
      run: |
        uv pip install --system -r compiler/requirements_dev.txt
        uv pip install --system -r lib/py/requirements_dev.txt
      if: "matrix.python == '3.11'"

    - name: Install tests requirements
      run: |
        uv pip install --system -r tests/requirements_tests.txt

    - name: Install clang-format
      run: |
        sudo apt-get update
        sudo apt-get install -y clang-format
      if: "matrix.python == '3.11'"

    - name: Run lints
      run: |
        make lint
      if: "matrix.python == '3.11'"

    - name: Run tests
      run: |
        make test --no-print-directory -s
